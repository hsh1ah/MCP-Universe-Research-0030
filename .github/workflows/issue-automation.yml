name: Issue Auto-Comment

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check issue labels and comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            
            let comment = null;
            
            if (labels.includes('bug')) {
              comment = 'Thank you. We will fix it.';
            } else if (labels.includes('feature')) {
              comment = 'Thank you, we will consider to include this feature.';
            } else if (labels.includes('discussion')) {
              comment = 'Thanks for starting this discussion! We welcome community input.';
            }
            
            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });
            }
